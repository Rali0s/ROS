name: beta-artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'beta-*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_glob: src-tauri/target/release/bundle/dmg/*.dmg
            bundle_label: macos-dmg
          - os: windows-latest
            artifact_glob: src-tauri/target/release/bundle/nsis/*.exe
            bundle_label: windows-installer
          - os: ubuntu-22.04
            artifact_glob: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
            bundle_label: linux-bundles

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux bundle dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint beta build
        run: npx eslint src scripts

      - name: Build desktop beta artifacts
        run: npm run desktop:build

      - name: Generate checksums
        run: node scripts/generate-release-checksums.mjs

      - name: Upload beta bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bundle_label }}
          path: |
            ${{ matrix.artifact_glob }}
            release/CHECKSUMS.txt
            release/BETA_RELEASE_NOTES.generated.md
            release/BETA_SMOKE_CHECKLIST.md
          if-no-files-found: warn
